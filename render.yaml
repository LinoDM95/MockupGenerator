# Render Blueprint — ohne Redis (Celery: CELERY_TASK_ALWAYS_EAGER=true).
# DATABASE_URL vom Postgres-Service; DJANGO_ALLOWED_HOSTS / CORS in Render setzen.

databases:
  - name: mockup-postgres
    databaseName: mockup
    user: mockup

services:
  - type: web
    name: mockup-web
    runtime: python
    rootDir: .
    buildCommand: |
      pip install -r backend/requirements.txt &&
      cd frontend/frontend && npm ci && npm run build &&
      cd ../../backend && python manage.py collectstatic --noinput
    startCommand: cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      # Muss ein gültiger Fernet-Key sein (siehe .env.example) — nicht auto-generieren.
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: mockup-postgres
          property: connectionString
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "true"
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        sync: false
