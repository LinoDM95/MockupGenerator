<!doctype html>
<html lang="de" class="antialiased scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PrintFlow | Print-on-Demand Automatisierung</title>
    <script>
      // Farbschema-Hydration: VOR dem ersten Paint `.dark` setzen,
      // damit bei Dark-Mode-Start kein heller Flash entsteht.
      (function () {
        try {
          var stored =
            localStorage.getItem("pf-color-scheme") ||
            localStorage.getItem("ce-color-scheme");
          var isDark;
          if (stored === "light") isDark = false;
          else if (stored === "dark") isDark = true;
          else if (stored === "system" && window.matchMedia)
            isDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          else isDark = true; /* Standard: Dark Mode (kein Eintrag / ungültig) */
          document.documentElement.classList.toggle("dark", isDark);
          document.documentElement.style.colorScheme = isDark ? "dark" : "light";
        } catch (e) {
          document.documentElement.classList.add("dark");
          document.documentElement.style.colorScheme = "dark";
        }
      })();
    </script>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
