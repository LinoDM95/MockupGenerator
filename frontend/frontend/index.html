<!doctype html>
<html lang="de" class="antialiased scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Creative Engine | Print-on-Demand Automatisierung</title>
    <script>
      // Farbschema-Hydration: VOR dem ersten Paint `.dark` setzen,
      // damit bei Dark-Mode-Start kein heller Flash entsteht.
      (function () {
        try {
          var stored = localStorage.getItem("ce-color-scheme");
          var isDark =
            stored === "dark" ||
            (stored !== "light" &&
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", isDark);
          document.documentElement.style.colorScheme = isDark ? "dark" : "light";
        } catch (e) {
          /* localStorage ggf. blockiert → Fallback: hell. */
          document.documentElement.style.colorScheme = "light";
        }
      })();
    </script>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
